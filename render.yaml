services:
  - type: web
    name: vedaai-api
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        value: demo
      - key: MONGODB_URI
        value: demo
      - key: REDIS_URL
        value: demo
      - key: FRONTEND_URL
        value: https://vedaai-web.onrender.com
      - key: PORT
        value: 4000

  - type: web
    name: vedaai-web
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NEXT_PUBLIC_API_URL
        value: https://vedaai-api.onrender.com
      - key: NEXT_PUBLIC_WS_URL
        value: wss://vedaai-api.onrender.com/ws
      - key: ANTHROPIC_API_KEY
        value: demo
