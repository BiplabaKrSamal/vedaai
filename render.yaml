# Render Blueprint — zero external dependencies, deploys instantly
# https://render.com/deploy?repo=https://github.com/BiplabaKrSamal/vedaai

services:
  # ── API (Express + in-memory MongoDB + in-memory queue) ──────────────────
  - type: web
    name: vedaai-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm@9.14.2 && pnpm install --frozen-lockfile && pnpm --filter @vedaai/api build
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Demo mode: no real API key, MongoDB, or Redis needed
      - key: ANTHROPIC_API_KEY
        value: demo
      - key: MONGODB_URI
        value: demo
      - key: REDIS_URL
        value: demo
      - key: FRONTEND_URL
        value: https://vedaai-web.onrender.com

  # ── Web (Next.js standalone) ─────────────────────────────────────────────
  - type: web
    name: vedaai-web
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm@9.14.2 && pnpm install --frozen-lockfile && pnpm --filter @vedaai/web build
    startCommand: node apps/web/.next/standalone/apps/web/server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: HOSTNAME
        value: 0.0.0.0
      - key: NEXT_PUBLIC_API_URL
        value: https://vedaai-api.onrender.com
      - key: NEXT_PUBLIC_WS_URL
        value: wss://vedaai-api.onrender.com/ws
      # Demo banner
      - key: ANTHROPIC_API_KEY
        value: demo
