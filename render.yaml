services:
  - type: web
    name: vedaai-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: "bash scripts/render-build-api.sh"
    startCommand: "node apps/api/dist/index.js"
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        value: demo
      - key: MONGODB_URI
        value: demo
      - key: REDIS_URL
        value: demo
      - key: FRONTEND_URL
        value: https://vedaai-web.onrender.com

  - type: web
    name: vedaai-web
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: "bash scripts/render-build-web.sh"
    startCommand: "cd apps/web && node_modules/.bin/next start"
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NEXT_PUBLIC_API_URL
        value: https://vedaai-api.onrender.com
      - key: NEXT_PUBLIC_WS_URL
        value: wss://vedaai-api.onrender.com/ws
      - key: ANTHROPIC_API_KEY
        value: demo
