services:
  # ─── Frontend (Next.js) ───────────────────────────────
  - type: web
    name: vedaai-web
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm@9.14.2 && pnpm install --frozen-lockfile && pnpm --filter @vedaai/web build
    startCommand: cd apps/web && node .next/standalone/apps/web/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: vedaai-api
          type: web
          property: host
          format: https://{value}
      - key: NEXT_PUBLIC_WS_URL
        fromService:
          name: vedaai-api
          type: web
          property: host
          format: wss://{value}/ws
    healthCheckPath: /

  # ─── Backend (Express API) ────────────────────────────
  - type: web
    name: vedaai-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install -g pnpm@9.14.2 && pnpm install --frozen-lockfile && pnpm --filter @vedaai/api build
    startCommand: node apps/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MONGODB_URI
        fromDatabase:
          name: vedaai-mongo
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: vedaai-redis
          type: redis
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          name: vedaai-web
          type: web
          property: host
          format: https://{value}
    healthCheckPath: /health

# ─── Databases ────────────────────────────────────────
databases:
  - name: vedaai-mongo
    databaseName: vedaai
    region: oregon
    plan: free

  - name: vedaai-redis
    region: oregon
    plan: free
    ipAllowList: []
